<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan & Finance simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1> Loan & assets simulator</h1>
        <p>Check your financial eligibility and simulate asset financing instantly</p>
    </header>
    <main class="container">
        <section class="card" id="main page">
            <h2>
                1. Your financial profile
            </h2>
            <div class="form-group">
                <label for="Monthly income"> Net Income( in ruppess):</label>
                <input type="number" id="monthly income" placeholder="e.g. 5000" required>
            </div>
            <div class="form-group">
                <label for="Existing-Debts">Existing monthly debts payment:</label>
                <input type="number" id="existing-debts" placeholder="e.g. 5000" required>
            </div>

            
        </section>
        <section class="card" id="asset section">
            <h2> 2. Assets Details</h2>
            <div class="form-group">
                <label for="Asset-type">What are you looking to finance!?</label>
                <select id="asset-type">
                    <option value="auto">🚗 Auto / Car Loan (Avg. 6% Interest)</option>
                    <option value="home">🏠 Home Mortgage (Avg. 4.5% Interest)</option>
                    <option value="tech">💻 Tech & Equipment (Avg. 10% Interest)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="asset cost">Total Asset cost</label>
                <input type="number" id="asset cost" placeholder="e.g. 35000" required>
            </div>
            <div class="form-group">
                <label for="down payment">Down payment</label>
                <input type="number" id="down payment" placeholder="e.g. 5000" required>
            </div>
            <button id="calculate btn">Check Eligibility & Calculate</button> 
        </section>
        <section class="card" id=" Results-section">
            <h2> 3. Financing Result</h2>
            <div id="verdict-output">
                <p>Fill up all the information mentioned above !!!</p>

            </div>
        </section>

        

        

        

        
    </main>
    
</body>
</html>
